<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wall it — web demo</title>
    <meta name="robots" content="noindex" />
    <style>
      :root {
        --pine: #0a2c2d;
        --pine2: #071f20;
        --mint: #7fe9c3;
        --honey: #f2b441;
        --paper: #eef6f2;
      }
      * { box-sizing: border-box; margin: 0; }
      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
        text-align: center;
        color: var(--paper);
        background: radial-gradient(120% 90% at 50% 0%, #12403f, transparent 55%),
          linear-gradient(180deg, var(--pine), var(--pine2));
        font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
        line-height: 1.6;
      }
      .wrap { max-width: 34rem; }
      .mark {
        width: 46px; height: 46px; border-radius: 13px; margin: 0 auto 1.5rem;
        background: linear-gradient(145deg, var(--mint), var(--honey));
        box-shadow: inset 0 0 0 5px rgba(10, 44, 45, 0.55);
      }
      h1 { font-size: clamp(1.6rem, 4vw, 2.3rem); letter-spacing: -0.02em; color: #f4faf7; }
      .tag { color: var(--mint); font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; font-size: 0.8rem; margin-bottom: 0.8rem; }
      p { color: #bcd2ca; margin-top: 1rem; }
      .links { margin-top: 2rem; display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap; }
      a {
        display: inline-block; padding: 0.8rem 1.3rem; border-radius: 999px;
        font-weight: 600; text-decoration: none; transition: transform 0.15s ease;
      }
      a:hover { transform: translateY(-2px); }
      .primary { background: var(--honey); color: #0b1e1d; }
      .ghost { border: 1.5px solid rgba(198, 207, 207, 0.35); color: #eef6f2; }
      a:focus-visible { outline: 3px solid var(--honey); outline-offset: 3px; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="mark" aria-hidden="true"></div>
      <p class="tag">Web demo</p>
      <h1>The interactive demo is being prepared.</h1>
      <p>
        A web build of Wall it — the same local-first app, running entirely in
        your browser, with its data staying on your device. It'll live here
        shortly.
      </p>
      <div class="links">
        <a class="primary" href="/">Back to the overview</a>
        <a class="ghost" href="https://github.com/eliegeorgioelkhoury/wall-it-showcase#how-it-works">Read the case study</a>
      </div>
    </main>
  </body>
</html>
