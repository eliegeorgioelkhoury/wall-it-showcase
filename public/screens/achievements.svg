<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 580" role="img" aria-label="Wall it — Achievements screen">
  <rect x="6" y="6" width="268" height="568" rx="38" fill="#0a2c2d"/>
  <rect x="14" y="14" width="252" height="552" rx="31" fill="#f5f8f6"/>
  <rect x="116" y="24" width="48" height="7" rx="3.5" fill="#0a2c2d" opacity="0.22"/>
  <text x="34" y="70" font-family="'General Sans', system-ui, sans-serif" font-size="20" font-weight="700" fill="#0b1e1d">Achievements</text>
  <text x="34" y="90" font-family="Inter, sans-serif" font-size="11" fill="#8b9997">Earned locally · kept forever</text>
  <!-- streak banner -->
  <rect x="34" y="104" width="212" height="70" rx="18" fill="#0f3d3e"/>
  <circle cx="72" cy="139" r="20" fill="#f2b441"/>
  <path d="M72 128c4 5 6 8 6 12a6 6 0 0 1-12 0c0-2 1-4 3-6-1 4 3 5 3 2 0-3-3-4 0-8z" fill="#0a2c2d"/>
  <text x="104" y="134" font-family="'General Sans', system-ui, sans-serif" font-size="17" font-weight="700" fill="#f4faf7">12-day streak</text>
  <text x="104" y="153" font-family="Inter, sans-serif" font-size="11" fill="#7fe9c3">Longest under-budget run</text>
  <!-- badges grid label -->
  <text x="34" y="204" font-family="'General Sans', system-ui, sans-serif" font-size="13" font-weight="600" fill="#0b1e1d">Badges</text>
  <!-- badge helper: earned = colored, locked = gray -->
  <g font-family="Inter, sans-serif" font-size="9.5" text-anchor="middle">
    <!-- row 1 -->
    <circle cx="70" cy="248" r="24" fill="#eafaf3" stroke="#7fe9c3" stroke-width="2"/><path d="M60 248l7 7 13-14" stroke="#0f3d3e" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="70" y="288" fill="#405754">First $1k</text>
    <circle cx="140" cy="248" r="24" fill="#fdf3dd" stroke="#f2b441" stroke-width="2"/><path d="M140 236l4 8 8 1-6 6 2 8-8-4-8 4 2-8-6-6 8-1z" fill="#f2b441"/><text x="140" y="288" fill="#405754">Saver</text>
    <circle cx="210" cy="248" r="24" fill="#eafaf3" stroke="#7fe9c3" stroke-width="2"/><circle cx="210" cy="248" r="9" fill="none" stroke="#0f3d3e" stroke-width="3"/><text x="210" y="288" fill="#405754">On budget</text>
    <!-- row 2 (locked) -->
    <circle cx="70" cy="340" r="24" fill="#eef2f0" stroke="#dde6e2" stroke-width="2"/><rect x="64" y="338" width="12" height="9" rx="2" fill="#c6cfcf"/><path d="M66 338v-3a4 4 0 0 1 8 0v3" fill="none" stroke="#c6cfcf" stroke-width="2"/><text x="70" y="380" fill="#8b9997">No-spend</text>
    <circle cx="140" cy="340" r="24" fill="#eef2f0" stroke="#dde6e2" stroke-width="2"/><rect x="134" y="338" width="12" height="9" rx="2" fill="#c6cfcf"/><path d="M136 338v-3a4 4 0 0 1 8 0v3" fill="none" stroke="#c6cfcf" stroke-width="2"/><text x="140" y="380" fill="#8b9997">6-month</text>
    <circle cx="210" cy="340" r="24" fill="#eef2f0" stroke="#dde6e2" stroke-width="2"/><rect x="204" y="338" width="12" height="9" rx="2" fill="#c6cfcf"/><path d="M206 338v-3a4 4 0 0 1 8 0v3" fill="none" stroke="#c6cfcf" stroke-width="2"/><text x="210" y="380" fill="#8b9997">Investor</text>
  </g>
  <text x="140" y="430" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#8b9997">3 of 24 earned · appended, never reset</text>
  <!-- tab bar -->
  <line x1="14" y1="520" x2="266" y2="520" stroke="#dde6e2"/>
  <g fill="#c6cfcf">
    <rect x="34" y="536" width="18" height="14" rx="2"/>
    <circle cx="99" cy="543" r="8"/><rect x="134" y="536" width="16" height="14" rx="2"/><path d="M184 550v-8M191 550v-12M198 550v-6" stroke="#c6cfcf" stroke-width="3" stroke-linecap="round"/>
    <path d="M238 534l3 6 6 1-4.5 4.5 1 6-5.5-3-5.5 3 1-6-4.5-4.5 6-1z" fill="#0f3d3e"/>
  </g>
</svg>
